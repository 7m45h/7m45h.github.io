<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="keywords" content="webrtc, serverless, chatroom">
        <meta name="description" content="serverless webrtc chatroom">
        <meta name="author" content="tmash">
        <title>pirate_party</title>
        <link rel="icon" type="image/gif" sizes="420x420" href="/shared/logo.png">
        <link rel="stylesheet" type="text/css" href="./assets/main.css">
        <script src="./assets/footer.js" defer></script>
        <script src="./assets/main.js" defer></script>
    </head>
    <body>
        <nav id="header">
            <a id="a-home" href="/">
                <img src="/shared/logo.png">
            </a>
            <a id="a-repo" href="https://github.com/7m45h/7m45h.github.io/tree/master/pirate_party/" target="_blank">
                <h1>pirate_party &#8599;</h1>
            </a>
        </nav>
        <main id="main">
            <div id="div-chat">
                <div id="messages"></div>
                <input id="input-message" type="text">
                <button id="button-send" onclick="sendChatMessage()">send</button>
            </div>
            <div id="div-cams"></div>
            <div id="div-file"></div>
            <div id="div-conn">
                <button id="conn-offer" value="createOffer" onclick="buttonHandler(this.value)">create offer</button>
                <button id="conn-answer" value="createAnswer" onclick="buttonHandler(this.value)"  disabled>create answer</button>
                <textarea id="text-offer"></textarea>
                <textarea id="text-answer"></textarea>
            </div>
        </main>
        <footer id="footer"></footer>
    </body>
</html>
