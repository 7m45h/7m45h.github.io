<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="keywords" content="random, password, generator">
        <meta name="description" content="generate random passwords">
        <meta name="author" content="tmash">
        <title>vigilant_engine</title>
        <link rel="icon" type="image/gif" sizes="420x420" href="/shared/logo.png">
        <link rel="stylesheet" type="text/css" href="./assets/main.css">
        <script src="./assets/main.js" defer></script>
    </head>
    <body>
        <nav id="header">
            <a id="a-home" href="/">
                <img src="/shared/logo.png">
            </a>
            <a id="a-repo" href="/" target="_blank">
                <h1>vigilant_engine &#8599;</h1>
            </a>
        </nav>
        <main id="main">
            <div id="div-config">
                <div>
                    <input type="checkbox" id="check-upper" checked>
                    <label for="check-upper">Uppercase</label>
                </div>
                <div>
                    <input type="checkbox" id="check-lower" checked>
                    <label for="check-lower">Lowercase</label>
                </div>
                <div>
                    <input type="checkbox" id="check-digits" checked>
                    <label for="check-digits">Digits</label>
                </div>
                <div>
                    <input type="checkbox" id="check-punct" checked>
                    <label for="check-punct">Punctuations</label>
                </div>
                <div>
                    <input type="checkbox" id="check-space" checked>
                    <label for="check-space">space</label>
                </div>
                <div>
                    <input type="range" id="input-lenght" min="8" max="100">
                </div>
            </div>
        </main>
        <footer id="footer"></footer>
    </body>
</html>
